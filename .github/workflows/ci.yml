name: CI

on:
  pull_request:
  push:
    branches: [master]

permissions:
  contents: read

jobs:
  policy-gate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        with:
          script: |
            const body = process.env.PR_BODY ?? "";
            const requiredFragments = [
              "<!-- itakello-policy: pr-template@1 -->",
              "## Summary",
              "High-level description:",
              "Details:",
              "## Testing",
              "| Check | Outcome |",
              "Added tests:",
              "## Task",
              "Primary Notion task:",
              "Related tasks:",
            ];
            const missing = requiredFragments.filter(
              (fragment) => !body.includes(fragment),
            );

            if (missing.length > 0) {
              core.setFailed(
                `Pull request body does not follow the managed template. Missing: ${missing.join(", ")}`,
              );
            }

  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm build
